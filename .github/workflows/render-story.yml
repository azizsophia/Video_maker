name: Render Story Video

# AI-narrated story video (Daniel narration + real Sudais ayahs). Vertical.
on:
  workflow_dispatch:
    inputs:
      story:
        description: "Story script path"
        required: true
        default: "scripts/stories/gog-and-magog.json"
      theme:
        description: "Theme: midnight | emerald | sand | noor"
        required: true
        default: "midnight"
      orientation:
        description: "vertical (TikTok/Reels/Shorts) | landscape (YouTube long-form 16:9)"
        required: true
        default: "vertical"
      runner:
        description: "Runner: ubuntu-latest (free 2-core; footage is SLOW ~50-80min) | a larger-runner label e.g. ubuntu-8core (paid; footage ~10-15min)"
        required: false
        default: "ubuntu-latest"

jobs:
  render:
    # Free 2-core renders no-footage stories in ~9 min, but footage (alpha/video
    # compositing) is ~5x slower. For footage stories, point this at a larger
    # paid runner label (configure under Settings -> Actions -> Runners) and the
    # same pipeline renders ~4x faster and reliably.
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Chrome dependencies + ffmpeg
        run: |
          sudo apt-get update
          # ffmpeg is REQUIRED for footage (crop/stitch/chroma-key). Some runner
          # images don't ship it, and Remotion's bundled ffmpeg is a minimal build
          # with no filters — so footage would silently fall back to code scenes.
          sudo apt-get install -y ffmpeg libnss3 libdbus-1-3 libatk1.0-0 libgbm1 \
            libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libxss1 || \
          sudo apt-get install -y ffmpeg libnss3 libdbus-1-3 libatk1.0-0 libgbm1 \
            libasound2 libatk-bridge2.0-0 libgtk-3-0 libxss1
          echo "ffmpeg: $(command -v ffmpeg || echo MISSING)"

      - name: Install dependencies
        run: npm ci

      # Persist generated narration/ayah audio so visual-only re-renders never
      # re-spend ElevenLabs credits. Keyed on the story script — edit the script
      # and only the changed lines regenerate.
      - name: Restore narration cache
        uses: actions/cache@v4
        with:
          path: public/story-cache
          key: story-cache-${{ hashFiles(inputs.story) }}
          restore-keys: |
            story-cache-

      - name: Build story (narration + ayahs)
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          npx tsx scripts/fetch-story.ts \
            --story="${{ inputs.story }}" --theme="${{ inputs.theme }}" \
            --out=src/data/story-render.json

      - name: Render video
        run: |
          mkdir -p out
          if [ "${{ inputs.orientation }}" = "landscape" ]; then COMP=StoryVideoWide; else COMP=StoryVideo; fi
          # Crisp + fast + reliable: native 1080x1920 (TikTok/Shorts display res)
          # with visually-lossless JPEG quality 100 frames and a low CRF. The old
          # blur was JPEG-80 frames + CRF 23 + Drive's preview compression, NOT the
          # resolution. Upscaling (1.5x/2x) only slowed renders since the platforms
          # re-encode every upload down to ~1080p anyway.
          BG=$(node -e "try{process.stdout.write(require('./src/data/story-render.json').backgroundSrc||'')}catch(e){}")
          if [ -n "$BG" ] && [ -f "public/$BG" ]; then
            echo "Footage mode: OPAQUE chroma-key render (fast JPEG) + ffmpeg key/overlay."
            echo "  -> footage beats render solid green; ffmpeg keys it out and drops the"
            echo "     (gradient-baked) footage track behind. Opaque = the fast ~9 min path;"
            echo "     alpha/video compositing in Remotion is ~5x slower on this 2-core runner."
            # 1) Render normally (opaque JPEG, native h264+audio) — the fast path.
            npx remotion render "$COMP" "out/keyed.mp4" \
              --props=src/data/story-render.json \
              --image-format=jpeg --jpeg-quality=100 --crf=16 --concurrency=$(nproc)
            # 2) Key the green out of the render and lay the footage track underneath;
            #    despill removes green fringing on the calligraphy edges. Audio is
            #    carried straight from the keyed render.
            ffmpeg -y -i "public/$BG" -i out/keyed.mp4 \
              -filter_complex "[1:v]colorkey=0x00ff00:0.30:0.12,despill=type=green[fg];[0:v][fg]overlay=format=auto:shortest=1[v]" \
              -map "[v]" -map 1:a? -r 30 -c:v libx264 -crf 16 -pix_fmt yuv420p -c:a aac -b:a 192k \
              out/story.mp4
            rm -f out/keyed.mp4
          else
            npx remotion render "$COMP" "out/story.mp4" \
              --props=src/data/story-render.json \
              --image-format=jpeg --jpeg-quality=100 --crf=16 --concurrency=$(nproc)
          fi

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: story-video
          path: |
            out/story.mp4
            src/data/story-render.json
            src/data/story-facts.txt
          retention-days: 14

      - name: Check Drive credentials
        id: drive
        env:
          URL: ${{ secrets.DRIVE_UPLOAD_URL }}
        run: |
          if [ -n "$URL" ]; then echo "method=webapp" >> "$GITHUB_OUTPUT"; else echo "method=none" >> "$GITHUB_OUTPUT"; fi

      - name: Set up Python (Drive upload)
        if: ${{ steps.drive.outputs.method != 'none' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upload to Google Drive
        if: ${{ steps.drive.outputs.method != 'none' }}
        env:
          DRIVE_UPLOAD_URL: ${{ secrets.DRIVE_UPLOAD_URL }}
          DRIVE_UPLOAD_TOKEN: ${{ secrets.DRIVE_UPLOAD_TOKEN }}
        run: |
          NAME="Ketabi — Story — $(basename "${{ inputs.story }}" .json) (${{ inputs.orientation }}).mp4"
          # The Apps Script web-app upload has a payload cap (~50MB base64), so big
          # footage videos (~74MB at CRF16) fail. The ARTIFACT keeps full quality;
          # for Drive we send a bitrate-capped copy when the file is too large.
          UP="out/story.mp4"
          SZ=$(stat -c%s out/story.mp4)
          echo "story.mp4 is $SZ bytes"
          if [ "$SZ" -gt 34000000 ]; then
            echo "Too large for the Drive web app — encoding a size-capped copy for Drive (artifact stays full CRF16 quality)."
            # -preset slow squeezes noticeably more sharpness out of each bit; the
            # bitrate is kept low enough that even a ~2min video fits the web-app cap.
            ffmpeg -y -i out/story.mp4 -c:v libx264 -preset slow -b:v 1.7M -maxrate 2.2M -bufsize 4M \
              -pix_fmt yuv420p -c:a aac -b:a 128k out/story-drive.mp4
            UP="out/story-drive.mp4"
          fi
          python3 scripts/upload_to_drive.py --file "$UP" --name "$NAME" --mime video/mp4 --replace
