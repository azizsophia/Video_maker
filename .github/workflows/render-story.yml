name: Render Story Video

# AI-narrated story video (Daniel narration + real Sudais ayahs).
# orientation=wide -> long-form 16:9 (1920x1080) for YouTube;
# orientation=vertical -> 9:16 (1080x1920) Shorts/TikTok/Reels cut.
on:
  workflow_dispatch:
    inputs:
      story:
        description: "Story script path"
        required: true
        default: "scripts/stories/longform-euphrates.json"
      orientation:
        description: "wide (long-form 16:9 YouTube) or vertical (9:16 Shorts/Reels)"
        required: true
        default: "wide"
      theme:
        description: "Theme (blank = use the story's own; cinematic stories want 'ketabi'). Options: ketabi | atlas | midnight | emerald | sand | noor"
        required: false
        default: ""

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libdbus-1-3 libatk1.0-0 libgbm1 \
            libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libxss1 || \
          sudo apt-get install -y libnss3 libdbus-1-3 libatk1.0-0 libgbm1 \
            libasound2 libatk-bridge2.0-0 libgtk-3-0 libxss1

      - name: Install dependencies
        run: npm ci

      - name: Build story (narration + ayahs)
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          npx tsx scripts/fetch-story.ts \
            --story="${{ inputs.story }}" --theme="${{ inputs.theme }}" \
            --out=src/data/story-render.json

      - name: Render video
        run: |
          COMP="StoryVideo"
          if [ "${{ inputs.orientation }}" = "wide" ]; then COMP="StoryVideoWide"; fi
          mkdir -p out
          # Use every core; --crf 23 keeps the (low-motion) video crisp but far
          # smaller, so long-form episodes fit under the Drive web-app limit.
          npx remotion render "$COMP" "out/story.mp4" \
            --props=src/data/story-render.json --concurrency=$(nproc) --crf 23

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: story-video
          path: |
            out/story.mp4
            src/data/story-render.json
          retention-days: 14

      - name: Check Drive credentials
        id: drive
        env:
          URL: ${{ secrets.DRIVE_UPLOAD_URL }}
        run: |
          if [ -n "$URL" ]; then echo "method=webapp" >> "$GITHUB_OUTPUT"; else echo "method=none" >> "$GITHUB_OUTPUT"; fi

      - name: Set up Python (Drive upload)
        if: ${{ steps.drive.outputs.method != 'none' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upload to Google Drive
        if: ${{ steps.drive.outputs.method != 'none' }}
        env:
          DRIVE_UPLOAD_URL: ${{ secrets.DRIVE_UPLOAD_URL }}
          DRIVE_UPLOAD_TOKEN: ${{ secrets.DRIVE_UPLOAD_TOKEN }}
        run: |
          NAME="Ketabi — Story — $(basename "${{ inputs.story }}" .json) (${{ inputs.orientation }}).mp4"
          python3 scripts/upload_to_drive.py --file "out/story.mp4" --name "$NAME" --mime video/mp4 --replace
