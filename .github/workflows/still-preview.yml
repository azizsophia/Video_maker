name: Still Preview

# Renders a few real Remotion frames of the institutional style (no ElevenLabs)
# and commits them to public/preview/, so the look can be verified before a full
# video render.
on:
  push:
    branches: ["claude/video-performance-analysis-3bjmgv"]
    paths:
      - "src/QuranVideo/**"
      - "src/data/institutional-sample.json"
      - ".github/workflows/still-preview.yml"

permissions:
  contents: write

jobs:
  still:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libdbus-1-3 libatk1.0-0 libgbm1 \
            libasound2t64 libatk-bridge2.0-0 libgtk-3-0 libxss1 || \
          sudo apt-get install -y libnss3 libdbus-1-3 libatk1.0-0 libgbm1 \
            libasound2 libatk-bridge2.0-0 libgtk-3-0 libxss1
      - name: Install dependencies
        run: npm ci
      - name: Render stills
        run: |
          mkdir -p public/preview
          for F in 60 180 300 440 570 700; do
            npx remotion still StoryVideo "public/preview/inst-$F.png" \
              --props=src/data/institutional-sample.json --frame=$F
          done
          for F in 75 225 380; do
            npx remotion still StoryVideo "public/preview/cine-$F.png" \
              --props=src/data/cinematic-sample.json --frame=$F
          done
      - name: Commit stills
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/preview/inst-*.png
          if git diff --cached --quiet; then echo "no changes"; else
            git commit -m "Add institutional still previews (automated)"
            git push origin HEAD:${{ github.ref_name }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: institutional-stills
          path: public/preview/inst-*.png
          retention-days: 14
